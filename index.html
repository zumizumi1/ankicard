<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>単語カード</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <nav class="mode-tabs" role="tablist" aria-label="画面切り替え">
        <button
          class="tab-button is-active"
          id="study-tab"
          type="button"
          role="tab"
          aria-selected="true"
          aria-controls="study-panel"
          data-tab-target="study"
        >
          単語一覧
        </button>
        <button
          class="tab-button"
          id="editor-tab"
          type="button"
          role="tab"
          aria-selected="false"
          aria-controls="editor-panel"
          data-tab-target="editor"
        >
          内容入力
        </button>
      </nav>

      <section
        class="study-panel tab-panel is-active"
        id="study-panel"
        role="tabpanel"
        aria-labelledby="study-tab"
      >
        <header class="topbar">
          <div>
            <p class="eyebrow">Word list</p>
            <h1 id="app-title">単語カード</h1>
          </div>
          <div class="counter" aria-live="polite">
            <span id="total-number">0</span>
            <span>語</span>
          </div>
        </header>

        <div class="study-filter">
          <label for="category-filter">カテゴリー</label>
          <select id="category-filter"></select>
        </div>

        <section class="word-preview" aria-labelledby="word-preview-title">
          <div class="word-preview-heading">
            <h2 id="word-preview-title">単語一覧</h2>
            <span id="word-list-count"></span>
          </div>
          <div class="word-list" id="word-list"></div>
        </section>
      </section>

      <section
        class="editor-panel tab-panel"
        id="editor-panel"
        role="tabpanel"
        aria-labelledby="editor-tab"
        hidden
      >
        <div class="section-heading">
          <h2 id="editor-title">単語リスト</h2>
          <button class="text-button" id="reset-sample" type="button">サンプルに戻す</button>
        </div>

        <label class="input-label" for="card-input">
          1行につき「問題,答え,カテゴリー,豆知識」またはタブ区切り
        </label>
        <textarea id="card-input" spellcheck="false"></textarea>

        <div class="editor-actions">
          <button class="primary-button" id="load-cards" type="button">この内容で作成</button>
          <p class="status" id="status-message" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script src="cards-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
